name: Sync prefixed skills

on:
  workflow_dispatch:

  schedule:
    # 每天 UTC 02:17 执行
    # 上海/新加坡时间 10:17
    - cron: "17 2 * * *"


permissions:
  contents: write


concurrency:
  group: sync-prefixed-skills
  cancel-in-progress: true


env:
  PREFIX: mp-
  DISPLAY_PREFIX: MP
  OUTPUT_BRANCH: prefixed
  UPSTREAM_REPO: mattpocock/skills


jobs:

  sync:

    runs-on: ubuntu-latest


    steps:

      #
      # Checkout 当前 Fork
      #
      - name: Checkout repository

        uses: actions/checkout@v4

        with:
          fetch-depth: 0


      #
      # 拉取上游最新版本
      #
      - name: Clone upstream repository

        run: |
          git clone \
            --depth=1 \
            https://github.com/${UPSTREAM_REPO}.git \
            /tmp/upstream


      #
      # 删除上游 Actions
      #
      # 防止同步 changesets/release workflow
      #
      - name: Remove upstream workflows

        run: |
          rm -rf /tmp/upstream/.github/workflows


      #
      # 修改 skill 名称和目录
      #
      - name: Prefix skills

        run: |
          python3 scripts/prefix-skills.py \
            /tmp/upstream/skills \
            ${PREFIX}


      #
      # 修改 plugin display_name
      #
      - name: Prefix plugin metadata

        run: |

          if [ -f /tmp/upstream/.claude-plugin/plugin.json ]; then

            python3 scripts/prefix-plugin.py \
              /tmp/upstream/.claude-plugin/plugin.json \
              ${DISPLAY_PREFIX}

          else

            echo "plugin.json not found, skip"

          fi


      #
      # 删除无关内容
      #
      # 保留：
      #   skills
      #   .claude-plugin
      #
      - name: Cleanup repository

        run: |

          cd /tmp/upstream


          rm -rf \
            .changeset \
            docs \
            .github


      #
      # 初始化生成仓库
      #
      - name: Prepare generated branch

        run: |

          cd /tmp/upstream

          rm -rf .git

          git init

          git checkout -b ${OUTPUT_BRANCH}


          git config user.name \
            "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          git add .


          git commit \
            -m "chore: sync prefixed skills"


      #
      # 推送 prefixed 分支
      #
      - name: Push prefixed branch

        env:
          GH_TOKEN: ${{ github.token }}

        run: |

          cd /tmp/upstream


          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"


          git push \
            origin \
            ${OUTPUT_BRANCH} \
            --force
