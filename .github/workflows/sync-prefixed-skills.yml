name: Sync prefixed skills

on:
  workflow_dispatch:

  schedule:
    # 每天 UTC 02:17 执行
    # 上海/新加坡时间 10:17
    - cron: "17 2 * * *"


permissions:
  contents: write


concurrency:
  group: sync-prefixed-skills
  cancel-in-progress: true


env:
  PREFIX: mp-
  OUTPUT_BRANCH: prefixed
  UPSTREAM_REPO: mattpocock/skills


jobs:

  sync:

    runs-on: ubuntu-latest


    steps:

      #
      # Checkout 当前 Fork
      #
      - name: Checkout repository

        uses: actions/checkout@v4

        with:
          fetch-depth: 0


      #
      # 拉取上游最新版本
      #
      - name: Clone upstream repository

        run: |
          git clone \
            --depth=1 \
            https://github.com/${UPSTREAM_REPO}.git \
            /tmp/upstream


      #
      # 删除上游 Actions
      #
      # 避免同步 changesets/release workflow
      #
      - name: Remove upstream workflows

        run: |
          rm -rf /tmp/upstream/.github/workflows


      #
      # 添加 mp 前缀
      #
      # 处理：
      # - skills/*/SKILL.md
      # - name
      # - skill directory
      # - display_name
      #
      - name: Prefix skills

        run: |
          python3 scripts/prefix-skills.py \
            /tmp/upstream \
            ${PREFIX}


      #
      # 验证转换结果
      #
      - name: Verify generated skills
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
      
          root = Path("/tmp/upstream/skills")
          files = sorted(root.rglob("agents/openai.yaml"))
      
          if not files:
              raise SystemExit("No agents/openai.yaml files found")
      
          invalid = []
      
          for file in files:
              text = file.read_text(encoding="utf-8")
      
              match = re.search(
                  r'(?m)^\s*display_name:\s*["\']?([^"\']+)',
                  text,
              )
      
              if not match:
                  invalid.append(f"{file}: display_name missing")
                  continue
      
              display_name = match.group(1).strip()
      
              print(f"{file}: {display_name}")
      
              if not display_name.startswith("MP "):
                  invalid.append(
                      f"{file}: invalid display_name: {display_name}"
                  )
      
          if invalid:
              print()
              print("Verification failed:")
      
              for item in invalid:
                  print(item)
      
              raise SystemExit(1)
      
          print()
          print(f"Verified {len(files)} display names")
          PY


      #
      # 清理无关文件
      #
      # 保留：
      # - skills
      # - .claude-plugin
      #
      - name: Cleanup repository

        run: |

          cd /tmp/upstream


          rm -rf \
            .changeset \
            docs \
            .github \
            examples \
            tests


      #
      # 初始化生成分支
      #
      - name: Prepare generated branch

        run: |

          cd /tmp/upstream


          rm -rf .git


          git init


          git checkout -b ${OUTPUT_BRANCH}


          git config user.name \
            "github-actions[bot]"


          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          git add .


          git commit \
            -m "chore: sync prefixed skills"



      #
      # 强制更新 prefixed 分支
      #
      - name: Push prefixed branch

        env:
          GH_TOKEN: ${{ github.token }}

        run: |

          cd /tmp/upstream


          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"


          git push \
            origin \
            ${OUTPUT_BRANCH} \
            --force
