name: Sync prefixed skills

on:
  workflow_dispatch:

  schedule:
    # 每天 UTC 02:17 执行
    # 上海/新加坡时间 10:17
    - cron: "17 2 * * *"


permissions:
  contents: write


concurrency:
  group: sync-prefixed-skills
  cancel-in-progress: true


env:
  PREFIX: mp-
  OUTPUT_BRANCH: prefixed
  UPSTREAM_REPO: mattpocock/skills


jobs:

  sync:

    runs-on: ubuntu-latest


    steps:

      #
      # Checkout 当前 Fork
      #
      - name: Checkout repository

        uses: actions/checkout@v4

        with:
          fetch-depth: 0


      #
      # 拉取上游最新版本
      #
      - name: Clone upstream repository

        run: |
          git clone \
            --depth=1 \
            https://github.com/${UPSTREAM_REPO}.git \
            /tmp/upstream


      #
      # 删除上游 Actions
      #
      # 避免同步 changesets/release workflow
      #
      - name: Remove upstream workflows

        run: |
          rm -rf /tmp/upstream/.github/workflows


      #
      # 添加 mp 前缀
      #
      # 处理：
      # - skills/*/SKILL.md
      # - name
      # - skill directory
      # - display_name
      #
      - name: Prefix skills

        run: |
          python3 scripts/prefix-skills.py \
            /tmp/upstream \
            ${PREFIX}


      #
      # 验证转换结果
      #
      - name: Verify generated skills

        run: |

          echo "===== Skills ====="

          find /tmp/upstream/skills \
            -maxdepth 2 \
            -name SKILL.md \
            | head -50


          echo

          echo "===== Display names ====="


          find /tmp/upstream \
            -name "*.json" \
            -print0 \
          | xargs -0 grep -n "display_name" \
          || true


      #
      # 清理无关文件
      #
      # 保留：
      # - skills
      # - .claude-plugin
      #
      - name: Cleanup repository

        run: |

          cd /tmp/upstream


          rm -rf \
            .changeset \
            docs \
            .github \
            examples \
            tests


      #
      # 初始化生成分支
      #
      - name: Prepare generated branch

        run: |

          cd /tmp/upstream


          rm -rf .git


          git init


          git checkout -b ${OUTPUT_BRANCH}


          git config user.name \
            "github-actions[bot]"


          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          git add .


          git commit \
            -m "chore: sync prefixed skills"



      #
      # 强制更新 prefixed 分支
      #
      - name: Push prefixed branch

        env:
          GH_TOKEN: ${{ github.token }}

        run: |

          cd /tmp/upstream


          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"


          git push \
            origin \
            ${OUTPUT_BRANCH} \
            --force
