name: Sync prefixed skills

on:
  workflow_dispatch:

  schedule:
    # 每天 UTC 02:17 执行
    # 上海/新加坡时间 10:17
    - cron: "17 2 * * *"


permissions:
  contents: write


concurrency:
  group: sync-prefixed-skills
  cancel-in-progress: true


env:
  PREFIX: mp-
  OUTPUT_BRANCH: prefixed
  UPSTREAM_REPO: mattpocock/skills


jobs:

  sync:

    runs-on: ubuntu-latest


    steps:

      #
      # 获取自己的 Fork
      #
      - name: Checkout repository

        uses: actions/checkout@v4

        with:
          fetch-depth: 0


      #
      # 拉取上游最新 skills
      #
      - name: Clone upstream repository

        run: |
          git clone \
            --depth=1 \
            https://github.com/${UPSTREAM_REPO}.git \
            /tmp/upstream


      #
      # 删除上游 GitHub Actions
      #
      # 防止同步 changesets/release workflow
      #
      - name: Remove upstream workflows

        run: |
          rm -rf /tmp/upstream/.github/workflows


      #
      # 添加 mp- 前缀
      #
      - name: Prefix skills

        run: |
          python3 scripts/prefix-skills.py \
            /tmp/upstream/skills \
            ${PREFIX}


      #
      # 清理 git 信息
      #
      - name: Prepare generated repository

        run: |
          rm -rf /tmp/upstream/.git


      #
      # 发布 prefixed 分支
      #
      - name: Push generated branch

        env:
          GH_TOKEN: ${{ github.token }}

        run: |

          cd /tmp/upstream


          git init

          git checkout -b ${OUTPUT_BRANCH}


          git config user.name \
            "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          git add .


          git commit \
            -m "chore: sync prefixed skills"


          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"


          git push \
            origin \
            ${OUTPUT_BRANCH} \
            --force
